<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار القدرات — قياس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg:            #F4F6FB;
  --surface:       #FFFFFF;
  --surface-2:     #EDF0F9;
  --border:        #E1E6F0;
  --border-focus:  #2D4EAA;
  --primary:       #2D4EAA;
  --primary-hover: #3D61CC;
  --primary-dim:   #EBF0FF;
  --primary-text:  #FFFFFF;
  --success:       #1A7F4B;
  --success-bg:    #E6F7EF;
  --success-border:#A3D9BE;
  --danger:        #C0392B;
  --danger-bg:     #FDECEA;
  --danger-border: #F0A8A2;
  --warning:       #B45309;
  --warning-bg:    #FEF3C7;
  --warning-border:#F5D073;
  --text:          #1A1F36;
  --text-secondary:#4B5563;
  --text-muted:    #9CA3AF;
  --font:          'Cairo', sans-serif;
  --r-sm:   8px;
  --r-md:   14px;
  --r-lg:   20px;
  --r-full: 9999px;
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(45,78,170,0.07), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 16px rgba(45,78,170,0.10), 0 2px 6px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(45,78,170,0.13), 0 4px 12px rgba(0,0,0,0.07);
  --ease:     cubic-bezier(0.4, 0, 0.2, 1);
  --duration: 200ms;
  --transition: var(--duration) var(--ease);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  direction: rtl;
}

body { line-height: 1.6; }

#app { min-height: 100vh; }

/* ─── Global Loader ─────────────────────────────────────── */
#globalLoader {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(244,246,251,0.92);
  backdrop-filter: blur(4px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
#globalLoader[hidden] { display: none; }

.loader-spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-msg {
  font-size: 1rem; font-weight: 600;
  color: var(--text-secondary);
}

/* ─── Modal ──────────────────────────────────────────────── */
#modalOverlay {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(26,31,54,0.45);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s var(--ease);
}
#modalOverlay[hidden] { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-box {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  max-width: 380px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s var(--ease);
}

.modal-title {
  font-size: 1.1rem; font-weight: 800;
  color: var(--text); margin-bottom: 6px;
}

.modal-subtitle {
  font-size: 0.85rem; color: var(--text-muted);
  margin-bottom: 20px;
}

.modal-count-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}

.count-btn {
  height: 54px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-family: var(--font);
  font-weight: 700; font-size: 1.05rem;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition);
}
.count-btn:hover {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--primary);
}

.modal-cancel {
  width: 100%; padding: 10px;
  border: none; background: none;
  font-family: var(--font);
  font-size: 0.9rem; color: var(--text-muted);
  cursor: pointer; border-radius: var(--r-sm);
  transition: color var(--transition);
}
.modal-cancel:hover { color: var(--text); }

/* ─── Toast / Fatal Error ────────────────────────────────── */
#fatalError {
  position: fixed; bottom: 20px; right: 20px; left: 20px;
  z-index: 950; max-width: 480px; margin: auto;
  background: var(--danger-bg);
  border: 1.5px solid var(--danger-border);
  border-radius: var(--r-md);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-md);
  animation: slideUp 0.2s var(--ease);
}
#fatalError[hidden] { display: none; }
.fatal-icon { font-size: 1.2rem; flex-shrink: 0; }
.fatal-msg { font-size: 0.9rem; font-weight: 600; color: var(--danger); flex: 1; }
.fatal-close {
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--danger); padding: 2px;
}

/* ─── Home Screen ────────────────────────────────────────── */
.home-screen {
  max-width: 1100px; margin: 0 auto;
  padding: 24px 16px 48px;
}

.home-header {
  text-align: center;
  padding: 36px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.home-logo {
  display: inline-flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 48px; height: 48px;
  background: var(--primary);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white;
  box-shadow: var(--shadow-sm);
}

.home-title {
  font-size: clamp(1.4rem, 4vw, 1.9rem);
  font-weight: 800; color: var(--text);
  letter-spacing: -0.02em;
}

.home-subtitle {
  font-size: 0.9rem; color: var(--text-muted);
  font-weight: 500; margin-top: 6px;
}

.stats-bar {
  display: flex; gap: 12px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 28px;
}

.stat-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-full);
  padding: 6px 14px;
  font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary);
  box-shadow: var(--shadow-xs);
  display: flex; align-items: center; gap: 6px;
}

.stat-pill strong { color: var(--primary); font-weight: 800; }

.section-label {
  font-size: 0.78rem; font-weight: 700;
  color: var(--text-muted); letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 14px;
}

.topics-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

@media (min-width: 600px) {
  .topics-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
}
@media (min-width: 1024px) {
  .topics-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
}

.topic-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 20px;
  box-shadow: var(--shadow-xs);
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  display: flex; align-items: center; gap: 14px;
  text-align: right;
  position: relative;
  overflow: hidden;
}

.topic-card::before {
  content: '';
  position: absolute;
  inset: 0; left: auto;
  width: 3px;
  background: var(--primary);
  opacity: 0;
  transition: opacity var(--transition);
}

.topic-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--primary);
}
.topic-card:hover::before { opacity: 1; }

.topic-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  background: var(--primary-dim);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--primary);
  font-weight: 900;
}

.topic-info { flex: 1; min-width: 0; }

.topic-name {
  font-weight: 700; font-size: 0.97rem;
  color: var(--text); margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.topic-count {
  font-size: 0.75rem; font-weight: 500;
  color: var(--text-muted);
}

.topic-arrow {
  color: var(--text-muted); font-size: 1rem;
  flex-shrink: 0;
  transition: transform var(--transition), color var(--transition);
}
.topic-card:hover .topic-arrow {
  transform: translateX(-4px);
  color: var(--primary);
}

.footer-actions {
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center;
}

.btn-outline-primary {
  padding: 11px 22px;
  border: 1.5px solid var(--primary);
  border-radius: var(--r-md);
  background: transparent;
  color: var(--primary);
  font-family: var(--font);
  font-weight: 700; font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.btn-outline-primary:hover {
  background: var(--primary-dim);
  box-shadow: var(--shadow-sm);
}

.btn-ghost-danger {
  padding: 11px 22px;
  border: 1.5px solid var(--danger-border);
  border-radius: var(--r-md);
  background: var(--danger-bg);
  color: var(--danger);
  font-family: var(--font);
  font-weight: 700; font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.btn-ghost-danger:hover {
  background: #fbd5d1;
  border-color: var(--danger);
}

/* ─── Exam Screen ────────────────────────────────────────── */
.exam-screen { min-height: 100vh; display: flex; flex-direction: column; }

.exam-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-xs);
  padding: 12px 16px 0;
}

.exam-header-row {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
  padding-bottom: 12px;
  max-width: 1100px; margin: 0 auto; width: 100%;
}

.btn-back {
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--surface);
  font-family: var(--font);
  font-weight: 600; font-size: 0.85rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.btn-back:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}

.exam-topic-label {
  font-weight: 700; font-size: 0.9rem;
  color: var(--text); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.exam-counter {
  font-size: 0.83rem; font-weight: 600;
  color: var(--text-secondary);
  background: var(--surface-2);
  padding: 4px 10px; border-radius: var(--r-full);
  white-space: nowrap;
}

.score-badges {
  display: flex; gap: 8px;
}

.score-badge {
  font-size: 0.8rem; font-weight: 700;
  padding: 3px 10px; border-radius: var(--r-full);
}
.score-badge.correct { background: var(--success-bg); color: var(--success); }
.score-badge.wrong   { background: var(--danger-bg);  color: var(--danger);  }

.progress-bar-wrap {
  height: 4px; background: var(--surface-2);
  border-radius: var(--r-full) var(--r-full) 0 0;
  max-width: 1100px; margin: 0 auto; width: 100%;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--primary);
  border-radius: var(--r-full);
  transition: width 0.4s var(--ease);
}

.exam-body {
  flex: 1;
  max-width: 1100px; margin: 0 auto; width: 100%;
  padding: 20px 16px 40px;
  display: flex; flex-direction: column; gap: 16px;
}

@media (min-width: 1024px) {
  .exam-body {
    display: grid;
    grid-template-columns: 1fr 130px;
    gap: 24px;
    align-items: start;
  }
}

.exam-main { min-width: 0; }

.timer-column {
  display: flex; flex-direction: row;
  align-items: center; gap: 12px;
}

@media (min-width: 1024px) {
  .timer-column {
    flex-direction: column;
    position: sticky; top: 100px;
  }
}

.meta-badges {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}

.meta-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-full);
  padding: 3px 10px;
  font-size: 0.75rem; font-weight: 500;
  color: var(--text-muted);
}
.meta-badge strong { color: var(--primary); font-weight: 700; }

.canvas-wrap {
  position: relative;
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  background: var(--surface);
  min-height: 280px;
}

#questionCanvas {
  width: 100%; display: block;
  border-radius: var(--r-md);
}

.skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg,
    var(--surface-2) 25%,
    var(--border) 50%,
    var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease infinite;
  border-radius: var(--r-md);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

.answer-btn {
  width: 100%; height: 54px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-family: var(--font);
  font-weight: 700; font-size: 1.1rem;
  color: var(--text);
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
}

.answer-btn:hover:not(:disabled):not(.answered) {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.answer-btn.correct {
  background: var(--success-bg);
  border-color: var(--success-border);
  color: var(--success);
  pointer-events: none;
}

.answer-btn.wrong {
  background: var(--danger-bg);
  border-color: var(--danger-border);
  color: var(--danger);
  pointer-events: none;
}

.answer-btn.disabled {
  opacity: 0.38;
  pointer-events: none;
  cursor: not-allowed;
}

.feedback-bar {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  animation: slideUp 0.2s var(--ease);
}

.feedback-bar[hidden] { display: none; }
.feedback-bar.correct { background: var(--success-bg); border: 1px solid var(--success-border); }
.feedback-bar.wrong   { background: var(--danger-bg);  border: 1px solid var(--danger-border);  }
.feedback-bar.timeout { background: var(--warning-bg); border: 1px solid var(--warning-border); }

.feedback-msg {
  font-weight: 700; font-size: 0.95rem;
  display: flex; align-items: center; gap: 8px;
}

.feedback-bar.correct .feedback-msg { color: var(--success); }
.feedback-bar.wrong   .feedback-msg { color: var(--danger); }
.feedback-bar.timeout .feedback-msg { color: var(--warning); }

.btn-next {
  padding: 9px 18px;
  border: none;
  border-radius: var(--r-sm);
  font-family: var(--font);
  font-weight: 700; font-size: 0.88rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
}
.feedback-bar.correct .btn-next { background: var(--success); color: white; }
.feedback-bar.wrong   .btn-next { background: var(--danger);  color: white; }
.feedback-bar.timeout .btn-next { background: var(--warning);  color: white; }
.btn-next:hover { opacity: 0.88; transform: translateY(-1px); }

/* ─── Timer ──────────────────────────────────────────────── */
#timerSvg { flex-shrink: 0; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.08); }
}
.timer-pulse { animation: pulse 0.8s ease-in-out infinite; }

.timer-label {
  font-size: 0.72rem; font-weight: 600;
  color: var(--text-muted); text-align: center;
  white-space: nowrap;
}

/* ─── Results Screen ─────────────────────────────────────── */
.results-screen {
  max-width: 900px; margin: 0 auto;
  padding: 24px 16px 60px;
}

.results-header {
  text-align: center;
  padding: 32px 0 28px;
}

.score-emoji {
  font-size: 3.5rem; margin-bottom: 12px;
  display: block;
  animation: bounceIn 0.5s var(--ease);
}
@keyframes bounceIn {
  0%   { transform: scale(0.5); opacity: 0; }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1);   opacity: 1; }
}

.score-percent {
  font-size: clamp(2.5rem, 8vw, 3.5rem);
  font-weight: 900; letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.score-percent.excellent { color: var(--success); }
.score-percent.good      { color: var(--warning); }
.score-percent.needs-work { color: var(--danger); }

.score-desc {
  font-size: 1rem; font-weight: 600;
  color: var(--text-secondary);
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 24px 0;
}

.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow-xs);
}

.stat-card-icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }
.stat-card-value { font-size: 1.4rem; font-weight: 800; color: var(--text); }
.stat-card-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-top: 2px; }

.review-section { margin-top: 28px; }

.review-title {
  font-size: 1rem; font-weight: 800;
  color: var(--text); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}

.review-table-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  overflow-x: auto;
}

.review-table {
  width: 100%; border-collapse: collapse;
  font-size: 0.85rem;
}

.review-table th {
  background: var(--surface-2);
  padding: 10px 14px;
  font-weight: 700; font-size: 0.78rem;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  text-align: right;
  white-space: nowrap;
}

.review-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-weight: 500;
}

.review-table tr:last-child td { border-bottom: none; }
.review-table tr.row-correct { background: var(--success-bg); }
.review-table tr.row-wrong   { background: var(--danger-bg); }

.result-tag {
  padding: 2px 8px;
  border-radius: var(--r-full);
  font-size: 0.78rem; font-weight: 700;
}
.result-tag.correct { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
.result-tag.wrong   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger-border);  }

.results-actions {
  display: flex; gap: 12px;
  flex-wrap: wrap; justify-content: center;
  margin-top: 32px;
}

.btn-primary {
  padding: 13px 28px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--r-md);
  font-family: var(--font);
  font-weight: 700; font-size: 1rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover {
  background: var(--primary-hover);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.btn-secondary {
  padding: 13px 28px;
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  font-family: var(--font);
  font-weight: 700; font-size: 1rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
}

/* ─── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface-2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Global Loader -->
<div id="globalLoader" hidden aria-live="polite" aria-label="جاري التحميل">
  <div class="loader-spinner"></div>

"use strict";

// ── PDF.js setup ────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PDF_DIRECT = 'https://raw.githubusercontent.com/bouy-create/file/main/bank_compressed.pdf';
const PDF_PROXY  = 'https://corsproxy.io/?' + encodeURIComponent(PDF_DIRECT);

let _pdfInstance = null;
let _pdfLoading  = false;
let _pdfQueue    = [];

async function getPDF() {
  if (_pdfInstance) return _pdfInstance;
  if (_pdfLoading) {
    return new Promise((res, rej) => _pdfQueue.push({ res, rej }));
  }
  _pdfLoading = true;
  showGlobalLoader('جاري تحميل بنك الأسئلة...');

  const load = (url) => pdfjsLib.getDocument({
    url,
    cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/cmaps/',
    cMapPacked: true
  }).promise;

  try {
    try {
      _pdfInstance = await load(PDF_DIRECT);
    } catch {
      _pdfInstance = await load(PDF_PROXY);
    }
    _pdfLoading = false;
    _pdfQueue.forEach(p => p.res(_pdfInstance));
    _pdfQueue = [];
    hideGlobalLoader();
    return _pdfInstance;
  } catch (err) {
    _pdfLoading = false;
    _pdfQueue.forEach(p => p.rej(err));
    _pdfQueue = [];
    hideGlobalLoader();
    showFatalError('تعذّر تحميل بنك الأسئلة. تحقق من اتصالك بالإنترنت وأعد المحاولة.');
    throw err;
  }
}

// ── Global UI helpers ───────────────────────────────────────────────────
function showGlobalLoader(msg) {
  document.getElementById('loaderMsg').textContent = msg || 'جاري التحميل...';
  document.getElementById('globalLoader').removeAttribute('hidden');
}
function hideGlobalLoader() {
  document.getElementById('globalLoader').setAttribute('hidden', '');
}
function showFatalError(msg) {
  document.getElementById('fatalMsg').textContent = msg;
  document.getElementById('fatalError').removeAttribute('hidden');
}

function openPdfViewer() {
  const url = 'https://docs.google.com/viewer?url=https://raw.githubusercontent.com/bouy-create/file/main/bank_compressed.pdf';
  window.open(url, '_blank');
}
document.getElementById('fatalClose').addEventListener('click', () => {
  document.getElementById('fatalError').setAttribute('hidden', '');
});

// ── App State ────────────────────────────────────────────────────────────
let session   = null;   // active session
let timerID   = null;   // setInterval handle
let timeLeft  = 60;
let answered  = false;

// ── LocalStorage helpers ─────────────────────────────────────────────────
function saveProgress() {
  try {
    localStorage.setItem('qiyas_progress', JSON.stringify(session));
  } catch(e) { /* storage full — ignore */ }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('qiyas_progress');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data && data.version === 1 && Array.isArray(data.questions)) return data;
  } catch(e) {}
  return null;
}

function clearProgress() {
  Object.keys(localStorage)
    .filter(k => k.startsWith('qiyas_'))
    .forEach(k => localStorage.removeItem(k));
}

// ── Shuffle ──────────────────────────────────────────────────────────────
function selectQuestions(topic, count) {
  const pool = QUESTIONS_DATA.filter(q => q.topic === topic);
  const arr  = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return count === 'all' ? arr : arr.slice(0, Math.min(count, arr.length));
}

// ── Timer ────────────────────────────────────────────────────────────────
const CIRC = 163.4; // 2π × 26

function stopTimer() {
  if (timerID) { clearInterval(timerID); timerID = null; }
}

function updateTimerUI(t) {
  const arc  = document.getElementById('timerArc');
  const txt  = document.getElementById('timerText');
  const svg  = document.getElementById('timerSvg');
  if (!arc || !txt) return;

  const offset = CIRC * (1 - t / 60);
  arc.style.strokeDashoffset = offset;
  txt.textContent = t;

  let color = 'var(--success)';
  if (t <= 10) {
    color = 'var(--danger)';
    svg && svg.classList.add('timer-pulse');
  } else if (t <= 30) {
    color = 'var(--warning)';
    svg && svg.classList.remove('timer-pulse');
  } else {
    svg && svg.classList.remove('timer-pulse');
  }
  arc.style.stroke = color;
  txt.style.fill   = color;
}

function startTimer() {
  stopTimer();
  timeLeft = 60;
  updateTimerUI(timeLeft);
  timerID = setInterval(() => {
    timeLeft--;
    updateTimerUI(timeLeft);
    if (timeLeft <= 0) {
      stopTimer();
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout() {
  if (answered) return;
  answered = true;
  const q = session.questions[session.currentIndex];
  session.results.push({
    page: q.page, bank: q.bank, q: q.q,
    userAnswer: '—', correctAnswer: q.answer,
    correct: false, timeSpent: 60
  });
  saveProgress();
  showFeedback('timeout');
  disableAllAnswers();
}

// ── PDF Rendering ─────────────────────────────────────────────────────────
async function renderQuestionPage(pageNumber) {
  const canvas  = document.getElementById('questionCanvas');
  const skeleton = document.getElementById('canvasSkeleton');
  if (!canvas) return;

  if (skeleton) skeleton.style.display = 'block';
  canvas.style.display = 'none';

  try {
    const pdf      = await getPDF();
    const page     = await pdf.getPage(pageNumber);
    const scale    = 2.0;
    const viewport = page.getViewport({ scale });

    const offscreen    = document.createElement('canvas');
    offscreen.width    = viewport.width;
    offscreen.height   = viewport.height;
    await page.render({ canvasContext: offscreen.getContext('2d'), viewport }).promise;

    const visibleH    = Math.floor(viewport.height * 1.00);
    canvas.width      = viewport.width;
    canvas.height     = visibleH;
    canvas.style.width  = '100%';
    canvas.style.height = 'auto';
    canvas.getContext('2d').drawImage(
      offscreen,
      0, 0, viewport.width, visibleH,
      0, 0, viewport.width, visibleH
    );

    if (skeleton) skeleton.style.display = 'none';
    canvas.style.display = 'block';
  } catch(err) {
    if (skeleton) skeleton.style.display = 'none';
    showFatalError('تعذّر تحميل الصفحة. تحقق من اتصالك وأعد المحاولة.');
  }
}

// ── Modal ────────────────────────────────────────────────────────────────
function showModal(topic, maxCount) {
  document.getElementById('modalTitle').textContent = topic;
  document.getElementById('modalSubtitle').textContent = 'اختر عدد الأسئلة للجلسة';

  const grid = document.getElementById('modalButtons');
  grid.innerHTML = '';
  const counts = [5, 10, 15, 'all'];
  const labels = ['٥ أسئلة', '١٠ أسئلة', '١٥ سؤالاً', 'الكل'];

  counts.forEach((c, i) => {
    const actual = c === 'all' ? maxCount : Math.min(c, maxCount);
    const btn = document.createElement('button');
    btn.className = 'count-btn';
    btn.textContent = c === 'all' ? `الكل (${maxCount})` : labels[i];
    btn.setAttribute('aria-label', `اختر ${labels[i]}`);
    if (actual === 0) { btn.disabled = true; btn.style.opacity = '0.4'; }
    btn.addEventListener('click', () => {
      hideModal();
      startSession(topic, c);
    });
    grid.appendChild(btn);
  });

  document.getElementById('modalOverlay').removeAttribute('hidden');
}

function hideModal() {
  document.getElementById('modalOverlay').setAttribute('hidden', '');
}

document.getElementById('modalCancel').addEventListener('click', hideModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) hideModal();
});

function startSession(topic, count) {
  const questions = selectQuestions(topic, count);
  session = {
    version: 1,
    topic,
    totalQuestions: questions.length,
    currentIndex: 0,
    questions,
    results: [],
    sessionStart: Date.now()
  };
  saveProgress();
  renderExam();
}

function showFeedback(type) {
  const bar = document.getElementById('feedbackBar');
  const msg = document.getElementById('feedbackMsg');
  if (!bar || !msg) return;

  bar.removeAttribute('hidden');
  bar.className = 'feedback-bar ' + type;

  if (type === 'correct') {
    msg.textContent = '✓ إجابة صحيحة!';
  } else if (type === 'wrong') {
    const q = session.questions[session.currentIndex];
    msg.innerHTML = `✗ إجابة خاطئة — الصواب: <strong>${q.answer}</strong>`;
  } else {
    const q = session.questions[session.currentIndex];
    msg.innerHTML = `⏱ انتهى الوقت — الصواب: <strong>${q.answer}</strong>`;
  }

  const { currentIndex, totalQuestions } = session;
  const btnNext = document.getElementById('btnNext');
  if (btnNext) {
    btnNext.textContent = currentIndex + 1 < totalQuestions ? 'السؤال التالي ←' : 'عرض النتائج ←';
  }
}

function disableAllAnswers() {
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => {
    if (!b.classList.contains('correct') && !b.classList.contains('wrong')) {
      b.classList.add('disabled');
    }
  });
}

function submitAnswer(value) {
  if (answered) return;
  answered = true;
  stopTimer();

  const q       = session.questions[session.currentIndex];
  const isRight = value === q.answer;
  const spent   = 60 - timeLeft;

  session.results.push({
    page: q.page, bank: q.bank, q: q.q,
    userAnswer: value, correctAnswer: q.answer,
    correct: isRight, timeSpent: spent
  });
  saveProgress();

  // Mark buttons
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => {
    const v = b.dataset.value;
    if (v === q.answer) {
      b.classList.add('correct');
      b.innerHTML = `${v} <span>✓</span>`;
    } else if (v === value && !isRight) {
      b.classList.add('wrong');
      b.innerHTML = `${v} <span>✗</span>`;
    } else {
      b.classList.add('disabled');
    }
  });

  showFeedback(isRight ? 'correct' : 'wrong');
}

function nextQuestion() {
  session.currentIndex++;
  if (session.currentIndex >= session.totalQuestions) {
    clearProgress();
    renderResults();
  } else {
    saveProgress();
    renderExam();
  }
}

// ── Screen: Results ───────────────────────────────────────────────────────
function renderResults() {
  stopTimer();
  if (!session) { renderHome(); return; }

  const { topic, totalQuestions, results, sessionStart } = session;
  const correct = results.filter(r => r.correct).length;
  const pct     = Math.round((correct / totalQuestions) * 100);
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');

  const emoji    = pct >= 80 ? '🎉' : pct >= 60 ? '💪' : '📚';
  const pctClass = pct >= 80 ? 'excellent' : pct >= 60 ? 'good' : 'needs-work';

  const rowsHTML = results.map((r, i) => `
    <tr class="${r.correct ? 'row-correct' : 'row-wrong'}">
      <td>${i + 1}</td>
      <td>${r.bank}</td>
      <td>${r.q}</td>
      <td>${r.userAnswer}</td>
      <td>${r.correctAnswer}</td>
      <td><span class="result-tag ${r.correct ? 'correct' : 'wrong'}">${r.correct ? '✓ صح' : '✗ خطأ'}</span></td>
    </tr>
  `).join('');

  const html = `
    <div class="results-screen">
      <div class="results-header">
        <span class="score-emoji">${emoji}</span>
        <div class="score-percent ${pctClass}">${pct}٪</div>
        <p class="score-desc">أجبت صحيحاً على ${correct} من ${totalQuestions} أسئلة</p>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-top:4px">${topic}</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-card-icon">✅</span>
          <div class="stat-card-value">${correct}</div>
          <div class="stat-card-label">الصحيح</div>
        </div>
        <div class="stat-card">
          <span class="stat-card-icon">❌</span>
          <div class="stat-card-value">${totalQuestions - correct}</div>
          <div class="stat-card-label">الخاطئ</div>
        </div>
        <div class="stat-card">
          <span class="stat-card-icon">⏱</span>
          <div class="stat-card-value">${mm}:${ss}</div>
          <div class="stat-card-label">الوقت</div>
        </div>
      </div>

      <div class="review-section">
        <div class="review-title">📋 مراجعة الإجابات</div>
        <div class="review-table-wrap">
          <table class="review-table">
            <thead>
              <tr>
                <th>#</th>
                <th>البنك</th>
                <th>رقم السؤال</th>
                <th>إجابتك</th>
                <th>الصحيحة</th>
                <th>النتيجة</th>
              </tr>
            </thead>
            <tbody>${rowsHTML}</tbody>
          </table>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn-primary" id="btnRetry" aria-label="إعادة نفس الموضوع">
          🔄 إعادة نفس الموضوع
        </button>
        <button class="btn-secondary" id="btnHome" aria-label="العودة إلى الرئيسية">
          🏠 الرئيسية
        </button>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;

  document.getElementById('btnRetry').addEventListener('click', () => {
    const t = session.topic;
    const n = session.totalQuestions;
    startSession(t, n);
  });

  document.getElementById('btnHome').addEventListener('click', () => {
    session = null;
    renderHome();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────
(function boot() {
  const progress = loadProgress();
  if (progress && progress.currentIndex < progress.totalQuestions) {
    session = progress;
  }
  renderHome();
})();
</script>
</body>
</html>
